# Continuous integration for the FireRed BoxName Workbench.
#
# This workflow needs NO secrets, tokens, or credentials. The only network
# access is npm's normal dependency download during `npm ci`; every other
# step runs offline against the local checkout (the test suite mocks the
# app's one explicit GitHub-fetch action — it never makes a live request).
# `npm run audit:network` fails the build on any network primitive outside
# the single allowlisted fetch module, or on an unapproved host inside it.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: read-only checkout, nothing else.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Network audit
        run: npm run audit:network

      - name: Build
        run: npm run build
